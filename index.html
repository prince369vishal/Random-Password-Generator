<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>
        Generate a <br />
        <span class="spanText">Random Password</span>
      </h1>
      <div class="display">
        <input type="text" id="password" placeholder="Password" />
        <img onclick="copyPassword()" src="images 3/copy.png" alt="" />
      </div>

      <button onclick="createPassword()">
        <img src="images 3/generate.png" alt="" /> Generate Password
      </button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
